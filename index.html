<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MDM Pulse — Mobilne naprave</title>
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#070810;--surface:#0d0f1a;--surface2:#131627;--surface3:#1a1e30;
  --border:#1c2035;--border2:#242840;--border3:#2e3350;
  --blue:#378ADD;--blue-dim:rgba(55,138,221,.12);
  --green:#1D9E75;--green-dim:rgba(29,158,117,.1);
  --red:#E24B4A;--red-dim:rgba(226,75,74,.1);
  --amber:#BA7517;--amber-dim:rgba(186,117,23,.1);
  --teal:#5DCAA5;--purple:#7F77DD;
  --text:#e2e8f8;--text2:#8892b0;--text3:#4a5270;
  --font:'Segoe UI',system-ui,sans-serif;--mono:'Cascadia Code','Consolas',monospace;
  --r:10px;--rl:14px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border3);border-radius:3px;}

#app{display:flex;flex-direction:column;min-height:100vh;}
#topbar{padding:14px 32px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
#content{flex:1;padding:28px 32px;background:var(--bg);}

.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#378ADD,#7F77DD);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.logo-title{font-size:15px;font-weight:600;letter-spacing:-.025em;}
.logo-sub{font-size:11px;color:var(--text3);}
.topbar-right{display:flex;align-items:center;gap:10px;}
.live-pill{font-size:11px;font-weight:500;padding:4px 11px;border-radius:6px;background:rgba(29,158,117,.1);border:1px solid rgba(29,158,117,.25);color:#34d399;display:flex;align-items:center;gap:5px;}
.live-dot{width:6px;height:6px;border-radius:50%;background:#34d399;animation:pulse 2s infinite;}
.user-chip{display:flex;align-items:center;gap:7px;padding:5px 12px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);font-size:12px;color:var(--text2);}
.user-avatar{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,#378ADD,#7F77DD);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff;}
.btn{padding:7px 16px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:none;transition:all .15s;font-family:var(--font);}
.btn-ghost{background:var(--surface2);border:1px solid var(--border2);color:var(--text2);}
.btn-ghost:hover{border-color:var(--border3);color:var(--text);}
.btn-primary{background:linear-gradient(135deg,#378ADD,#7F77DD);color:#fff;font-weight:600;}
.btn-primary:hover{opacity:.88;}
.btn-danger{background:rgba(226,75,74,.12);border:1px solid rgba(226,75,74,.25);color:#f87171;}
.btn-danger:hover{background:rgba(226,75,74,.2);}

/* Login */
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:0;}
.login-card{background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:40px;width:440px;max-width:94vw;text-align:center;}
.login-icon{width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,rgba(55,138,221,.15),rgba(127,119,221,.15));border:1px solid rgba(55,138,221,.25);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;}
.login-title{font-size:22px;font-weight:600;letter-spacing:-.03em;margin-bottom:8px;}
.login-body{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:24px;}
.config-section{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:20px;text-align:left;}
.config-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;}
.field-wrap{margin-bottom:10px;}
.field-label{font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:500;}
.field-input{width:100%;padding:8px 11px;background:var(--surface3);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-size:12px;font-family:var(--mono);outline:none;transition:border-color .15s;}
.field-input:focus{border-color:var(--blue);}
.btn-login{width:100%;padding:12px;border-radius:10px;background:linear-gradient(135deg,#378ADD,#7F77DD);border:none;color:#fff;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;transition:opacity .15s;font-family:var(--font);}
.btn-login:hover{opacity:.88;}
.btn-login:disabled{opacity:.5;cursor:not-allowed;}

/* Tabs */
.tab-bar{display:flex;gap:2px;margin-bottom:22px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:4px;width:fit-content;}
.tab-btn{padding:7px 18px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text2);font-family:var(--font);transition:all .15s;display:flex;align-items:center;gap:7px;}
.tab-btn:hover{color:var(--text);}
.tab-btn.active{background:var(--surface3);color:var(--text);border:1px solid var(--border2);}
.tab-btn .tab-count{font-size:10px;padding:2px 6px;border-radius:10px;background:var(--blue-dim);color:var(--blue);font-weight:600;}

/* Dashboard */
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:12px;}
.page-title{font-size:20px;font-weight:600;letter-spacing:-.03em;}
.page-sub{font-size:12px;color:var(--text3);margin-top:3px;}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px;}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px 18px;position:relative;overflow:hidden;cursor:default;transition:transform .15s, border-color .15s;}
.kpi-card.clickable{cursor:pointer;}
.kpi-card.clickable:hover{border-color:var(--border3);transform:translateY(-1px);}
.kpi-glow{position:absolute;top:0;left:0;right:0;height:50px;pointer-events:none;border-radius:var(--rl) var(--rl) 0 0;}
.kpi-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.09em;margin-bottom:8px;}
.kpi-val{font-size:28px;font-weight:600;letter-spacing:-.04em;line-height:1;}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:5px;}

/* Filter */
.filter-wrap{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.filter-label{font-size:11px;color:var(--text3);margin-right:2px;}
.f-btn{padding:4px 11px;border-radius:6px;font-size:11px;font-weight:500;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all .12s;font-family:var(--font);}
.f-btn:hover{border-color:var(--border3);color:var(--text);}
.f-btn.active{background:rgba(55,138,221,.15);border-color:rgba(55,138,221,.4);color:#85B7EB;}
.sep{color:var(--border3);margin:0 4px;}
.count-badge{margin-left:auto;font-size:12px;color:var(--text3);}
.search-wrap{position:relative;flex:1;min-width:180px;max-width:280px;}
.search-input{width:100%;padding:6px 11px 6px 30px;background:var(--surface2);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-size:12px;outline:none;transition:border-color .15s;font-family:var(--font);}
.search-input:focus{border-color:var(--blue);}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;}

/* Table */
.table-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;}
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
thead tr{background:var(--surface2);}
th{padding:8px 12px;font-size:10px;font-weight:600;color:var(--text3);text-align:left;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.08em;white-space:nowrap;}
th.sortable{cursor:pointer;user-select:none;transition:color .12s;}
th.sortable:hover{color:var(--text2);}
th .sort-arrow{display:inline-block;margin-left:3px;color:var(--blue);font-size:9px;}
td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:var(--surface2);}

/* Device cell */
.dev-cell{display:flex;align-items:center;gap:10px;}
.dev-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.dev-name{font-family:var(--mono);font-size:12px;font-weight:500;cursor:pointer;transition:color .12s;}
.dev-name:hover{color:var(--blue);}
.dev-user{font-size:11px;color:var(--text3);cursor:pointer;transition:color .12s;}
.dev-user:hover{color:var(--text2);}

/* Badges */
.badge{font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;white-space:nowrap;}
.badge-ok{background:rgba(29,158,117,.12);color:#34d399;}
.badge-nc{background:rgba(226,75,74,.12);color:#f87171;}
.badge-gp{background:rgba(186,117,23,.12);color:#fbbf24;}
.badge-uk{background:rgba(74,82,112,.2);color:var(--text2);}
.badge-stale{background:rgba(186,117,23,.12);color:#fbbf24;font-size:10px;padding:2px 7px;margin-left:6px;}
.os-chip{font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;}

/* ── ORG VIEW ─────────────────────────────────────── */
.org-search-wrap{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.org-sort-wrap{display:flex;align-items:center;gap:6px;}

/* Org table row extras */
.plat-mini{display:flex;gap:4px;flex-wrap:wrap;}
.plat-pip{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;}

.compliance-bar-wrap{display:flex;align-items:center;gap:7px;}
.compliance-bar-track{flex:1;height:6px;border-radius:3px;background:var(--surface3);min-width:60px;position:relative;overflow:hidden;}
.compliance-bar-fill{height:100%;border-radius:3px;transition:width .5s ease;}
.compliance-pct{font-size:11px;font-family:var(--mono);color:var(--text2);min-width:34px;text-align:right;}

.org-drill-btn{font-size:11px;padding:3px 10px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;font-family:var(--font);transition:all .12s;white-space:nowrap;}
.org-drill-btn:hover{border-color:var(--blue);color:var(--blue);}

.domain-chip{display:flex;align-items:center;gap:8px;}
.domain-avatar{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;font-family:var(--mono);}
.domain-name{font-family:var(--mono);font-size:12px;font-weight:500;}
.domain-tld{color:var(--text3);}

/* Shared device row */
.shared-row .domain-name{color:var(--text3);font-style:italic;}

/* Loading / empty */
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;gap:14px;}
.spinner{width:28px;height:28px;border:2px solid rgba(55,138,221,.2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;}
.loading-text{font-size:13px;color:var(--text2);}
.empty-wrap{display:flex;flex-direction:column;align-items:center;padding:60px;gap:10px;text-align:center;}
.empty-text{font-size:13px;color:var(--text2);}
.error-box{background:rgba(226,75,74,.08);border:1px solid rgba(226,75,74,.2);border-radius:8px;padding:12px 16px;font-size:12px;color:#f87171;margin-bottom:14px;}

/* Progress bars */
.platform-bars{display:flex;flex-direction:column;gap:7px;margin-top:6px;}
.pbar-row{display:flex;align-items:center;gap:8px;}
.pbar-label{font-size:11px;color:var(--text2);min-width:54px;}
.pbar-track{flex:1;height:4px;border-radius:2px;background:var(--surface3);}
.pbar-fill{height:100%;border-radius:2px;transition:width .6s ease;}
.pbar-count{font-size:11px;font-family:var(--mono);color:var(--text3);min-width:24px;text-align:right;}

/* Chart */
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:18px 20px;margin-bottom:18px;}
.chart-header{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:16px;}
.chart-title{font-size:14px;font-weight:600;letter-spacing:-.02em;}
.chart-sub{font-size:11px;color:var(--text3);margin-top:2px;}
.chart-stats{display:flex;gap:18px;}
.chart-stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px;}
.chart-stat-val{font-size:18px;font-weight:600;letter-spacing:-.02em;}
.chart-controls{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:14px;}
.chart-svg-wrap{position:relative;width:100%;}
#trend-svg{width:100%;height:240px;display:block;}
.chart-tooltip{position:absolute;background:var(--surface3);border:1px solid var(--border3);border-radius:7px;padding:8px 11px;font-size:11px;pointer-events:none;opacity:0;transition:opacity .15s;box-shadow:0 4px 16px rgba(0,0,0,.4);z-index:10;white-space:nowrap;}
.chart-tooltip-date{font-size:10px;color:var(--text3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em;}
.chart-tooltip-val{font-family:var(--mono);font-weight:500;}
.chart-tooltip-val .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px;vertical-align:middle;}
.date-input{padding:4px 8px;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:11px;font-family:var(--mono);outline:none;cursor:pointer;color-scheme:dark;}
.date-input:focus{border-color:var(--blue);}
.date-input::-webkit-calendar-picker-indicator{filter:invert(.6);cursor:pointer;}

/* Toast */
.toast-wrap{position:fixed;bottom:20px;right:20px;z-index:1000;display:flex;flex-direction:column;gap:8px;}
.toast{background:var(--surface2);border:1px solid var(--border2);border-left:3px solid var(--green);border-radius:8px;padding:10px 16px;font-size:12px;color:var(--text);box-shadow:0 4px 16px rgba(0,0,0,.4);animation:toastIn .25s ease, toastOut .25s ease 2.5s forwards;display:flex;align-items:center;gap:8px;min-width:180px;}
.toast.err{border-left-color:var(--red);}
.toast.warn{border-left-color:var(--amber);}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeUp .2s ease;}
.modal-card{background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:24px;width:500px;max-width:94vw;max-height:80vh;overflow-y:auto;}
.modal-title{font-size:16px;font-weight:600;letter-spacing:-.02em;margin-bottom:4px;}
.modal-sub{font-size:11px;color:var(--text3);margin-bottom:18px;}
.modal-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px;}
.modal-row:last-of-type{border-bottom:none;}
.modal-row-label{color:var(--text3);}
.modal-row-val{color:var(--text);font-family:var(--mono);font-size:11px;}
.modal-close{margin-top:18px;width:100%;}

/* Trend SVG */
.trend-grid-line{stroke:var(--border);stroke-width:1;stroke-dasharray:2 4;}
.trend-axis-text{fill:var(--text3);font-size:10px;font-family:var(--mono);}
.trend-line{fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.trend-area{opacity:.15;}
.trend-dot{cursor:pointer;transition:r .15s;}
.trend-dot:hover{r:5;}

@keyframes spin{to{transform:rotate(360deg);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes toastIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}
@keyframes toastOut{to{opacity:0;transform:translateX(20px);}}
.anim{animation:fadeUp .3s ease both;}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div class="logo">
      <div class="logo-icon">
        <svg width="16" height="16" fill="none" viewBox="0 0 16 16">
          <rect x="2" y="2" width="5" height="5" rx="1.2" fill="white" opacity=".95"/>
          <rect x="9" y="2" width="5" height="5" rx="1.2" fill="white" opacity=".6"/>
          <rect x="2" y="9" width="5" height="5" rx="1.2" fill="white" opacity=".6"/>
          <rect x="9" y="9" width="5" height="5" rx="1.2" fill="white" opacity=".3"/>
        </svg>
      </div>
      <div>
        <div class="logo-title">MDM Pulse</div>
        <div class="logo-sub">Mobilne naprave · Intune</div>
      </div>
    </div>
    <div class="topbar-right" id="topbar-right"></div>
  </div>
  <div id="content">
    <div id="login-screen">
      <div class="login-card anim">
        <div class="login-icon">
          <svg width="28" height="28" fill="none" viewBox="0 0 28 28">
            <path d="M14 3L3 8v7c0 6 4.5 11 11 12 6.5-1 11-6 11-12V8L14 3z" stroke="#378ADD" stroke-width="1.6" stroke-linejoin="round"/>
            <path d="M10 14l2.5 2.5L18 11" stroke="#378ADD" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="login-title">MDM Pulse</div>
        <div class="login-body">Prijavi se s svojim Microsoft računom za ogled mobilnih naprav (iOS, iPadOS, Android) iz Intune.</div>
        <div class="config-section">
          <div class="config-title">Konfiguracija App Registration</div>
          <div class="field-wrap">
            <div class="field-label">Tenant ID</div>
            <input class="field-input" id="cfg-tenant" type="text" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" spellcheck="false"/>
          </div>
          <div class="field-wrap" style="margin-bottom:0;">
            <div class="field-label">Client ID (Application ID)</div>
            <input class="field-input" id="cfg-client" type="text" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" spellcheck="false"/>
          </div>
        </div>
        <div id="login-error" class="error-box" style="display:none;"></div>
        <button class="btn-login" id="btn-login" onclick="doLogin()">
          <div style="display:flex;align-items:center;gap:3px;">
            <svg width="16" height="16" viewBox="0 0 16 16">
              <rect x="1" y="1" width="6.5" height="6.5" fill="#f25022"/>
              <rect x="8.5" y="1" width="6.5" height="6.5" fill="#7fba00"/>
              <rect x="1" y="8.5" width="6.5" height="6.5" fill="#00a4ef"/>
              <rect x="8.5" y="8.5" width="6.5" height="6.5" fill="#ffb900"/>
            </svg>
          </div>
          Prijava z Microsoft računom
        </button>
        
          <div style="margin-top:14px;">
            <button onclick="toggleSaPanel()" style="background:none;border:none;cursor:pointer;font-size:11px;color:var(--text3);font-family:var(--font);padding:0;transition:color .15s;" id="sa-toggle-btn">napredna prijava</button>
          </div>
          
          <div id="sa-panel" style="display:none;margin-top:14px;">
            <div class="config-section">
              <div class="config-title">Service Account</div>
              <div class="field-wrap">
                <div class="field-label">Tenant ID</div>
                <input class="field-input" id="sa-tenant" type="text" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" spellcheck="false"/>
              </div>
              <div class="field-wrap">
                <div class="field-label">Client ID</div>
                <input class="field-input" id="sa-client" type="text" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" spellcheck="false"/>
              </div>
              <div class="field-wrap" style="margin-bottom:0;">
                <div class="field-label">Client Secret</div>
                <input class="field-input" id="sa-secret" type="password" placeholder="••••••••••••••••••••••••••••••••" spellcheck="false"/>
              </div>
            </div>
            <button class="btn-login" id="btn-sa-login" onclick="doServiceLogin()" style="margin-top:10px;">
              Prijava s service računom
            </button>
          </div>
      </div>
    </div>
    <div id="dashboard" style="display:none;"></div>
  </div>
</div>
<div class="toast-wrap" id="toast-wrap"></div>
<div id="modal-root"></div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────
const DEFAULT_TENANT = '';
const DEFAULT_CLIENT = '';

// ─── STATE ───────────────────────────────────────────────────────────────
let msalInstance = null;
let account = null;
let allDevices = [];
let filterPlatform = 'all';
let filterStatus = 'all';
let searchQuery = '';
let sortKey = 'lastSyncDateTime';
let sortDir = 'desc';
let trendRange = '30d';
let trendCustom = { from: null, to: null };
let trendPlatform = 'all';
let activeTab = 'devices'; // 'devices' | 'orgs'
let orgSearch = '';
let orgSortKey = 'total';
let orgSortDir = 'desc';

// ─── MSAL ────────────────────────────────────────────────────────────────
function initMsal(tenantId, clientId) {
  msalInstance = new msal.PublicClientApplication({
    auth: {
      clientId,
      authority: `https://login.microsoftonline.com/${tenantId}`,
      redirectUri: window.location.href.split('?')[0].split('#')[0],
    },
    cache: { cacheLocation: 'localStorage', storeAuthStateInCookie: false }
  });
}

async function doLogin() {
  const tenantId = document.getElementById('cfg-tenant').value.trim() || DEFAULT_TENANT;
  const clientId = document.getElementById('cfg-client').value.trim() || DEFAULT_CLIENT;
  const errEl = document.getElementById('login-error');
  if (!tenantId || !clientId) { errEl.textContent = 'Vnesi Tenant ID in Client ID.'; errEl.style.display = 'block'; return; }
  errEl.style.display = 'none';
  const btn = document.getElementById('btn-login');
  btn.disabled = true;
  btn.textContent = 'Preusmerjam…';
  try {
    localStorage.setItem('mdm_tenant', tenantId);
    localStorage.setItem('mdm_client', clientId);
    if (!msalInstance) { initMsal(tenantId, clientId); await msalInstance.initialize(); }
    await msalInstance.loginRedirect({ scopes: ['https://graph.microsoft.com/DeviceManagementManagedDevices.Read.All'], prompt: 'select_account' });
  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'Prijava z Microsoft računom';
    errEl.textContent = e.message || 'Prijava ni uspela.';
    errEl.style.display = 'block';
  }
}

function afterLogin() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  const initials = (account.name || account.username || 'U').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  document.getElementById('topbar-right').innerHTML = `
    <div class="live-pill"><div class="live-dot"></div>Živi podatki</div>
    <div class="user-chip">
      <div class="user-avatar">${initials}</div>
      <span>${account.name || account.username}</span>
    </div>
    <button class="btn btn-ghost" onclick="exportCSV()">⬇ CSV</button>
    <button class="btn btn-ghost" onclick="refreshData()">↻ Osveži</button>
    <button class="btn btn-danger" onclick="doLogout()">Odjava</button>
  `;
  loadDevices();
}

async function getToken() {
  // Check if service account token exists and is still valid
  const saToken = sessionStorage.getItem('mdm_sa_token');
  const saExp = parseInt(sessionStorage.getItem('mdm_sa_token_exp') || '0');
  
  if (saToken && Date.now() < saExp) {
    return saToken;
  }
  
  // If SA token expired, refresh it
  if (saToken && Date.now() >= saExp) {
    const t = localStorage.getItem('mdm_sa_tenant');
    const c = localStorage.getItem('mdm_sa_client');
    const s = prompt('Session potekla. Vnesi Client Secret za obnovitev:');
    if (t && c && s) {
      // Re-run silent refresh
      const body = new URLSearchParams({ grant_type:'client_credentials', client_id:c, client_secret:s, scope:'https://graph.microsoft.com/.default' });
      const res = await fetch(`https://login.microsoftonline.com/${t}/oauth2/v2.0/token`, { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body });
      const data = await res.json();
      if (data.access_token) {
        sessionStorage.setItem('mdm_sa_token', data.access_token);
        sessionStorage.setItem('mdm_sa_token_exp', String(Date.now() + (data.expires_in - 60) * 1000));
        return data.access_token;
      }
    }
    throw new Error('Seja potekla, prosim osveži stran.');
  }
  
  // Normal MSAL flow
  const resp = await msalInstance.acquireTokenSilent({
    scopes: ['https://graph.microsoft.com/DeviceManagementManagedDevices.Read.All'],
    account
  });
  return resp.accessToken;
}

// ─── API ─────────────────────────────────────────────────────────────────
async function loadDevices() {
  renderLoading();
  try {
    const token = await getToken();
    const filter = ['iOS','iPadOS','Android'].map(p=>`operatingSystem eq '${p}'`).join(' or ');
    const select = 'id,deviceName,operatingSystem,osVersion,complianceState,userPrincipalName,lastSyncDateTime,managedDeviceOwnerType,enrolledDateTime,model,manufacturer,serialNumber,imei,wiFiMacAddress';
    let url = `https://graph.microsoft.com/v1.0/deviceManagement/managedDevices?$filter=${encodeURIComponent(filter)}&$select=${select}&$top=999`;
    const devices = [];
    while (url) {
      const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
      if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.error?.message || `Graph API ${res.status}`); }
      const data = await res.json();
      devices.push(...(data.value||[]));
      url = data['@odata.nextLink'] || null;
    }
    allDevices = devices;
    renderDashboard();
    toast(`Naloženih ${devices.length} naprav`, 'ok');
  } catch(e) { renderError(e.message); }
}

async function refreshData() {
  filterPlatform='all'; filterStatus='all'; searchQuery=''; orgSearch='';
  await loadDevices();
}

async function doLogout() {
  try { if(msalInstance && account) await msalInstance.clearCache(); } catch(e){}
  localStorage.removeItem('mdm_tenant'); localStorage.removeItem('mdm_client');
  sessionStorage.clear(); window.location.reload();
}

// ─── HELPERS ─────────────────────────────────────────────────────────────
function platformColor(os) {
  if (!os) return '#4a5270';
  const l = os.toLowerCase();
  if (l==='ipados') return '#1D9E75';
  if (l==='ios') return '#378ADD';
  if (l==='android') return '#639922';
  return '#4a5270';
}
function platformEmoji(os) {
  if (!os) return '📱';
  const l = os.toLowerCase();
  if (l==='ipados') return '⬜';
  if (l==='ios') return '📱';
  if (l==='android') return '🤖';
  return '📱';
}
function statusBadge(s) {
  const m = { compliant:['badge-ok','Skladna'], noncompliant:['badge-nc','Neskladna'], inGracePeriod:['badge-gp','Grace'], unknown:['badge-uk','Neznano'], configManager:['badge-uk','Config Mgr'] };
  const [cls, label] = m[s]||m.unknown;
  return `<span class="badge ${cls}">${label}</span>`;
}
function fmtDate(iso) { if(!iso) return '—'; return new Date(iso).toLocaleDateString('sl-SI',{day:'2-digit',month:'2-digit',year:'numeric'}); }
function fmtDateShort(d) { return d.toLocaleDateString('sl-SI',{day:'2-digit',month:'2-digit'}); }
function fmtDateISO(d) { return d.toISOString().slice(0,10); }
function timeSince(iso) { if(!iso) return '—'; const diff=Date.now()-new Date(iso).getTime(); const days=Math.floor(diff/86400000); if(days===0) return 'danes'; if(days===1) return 'včeraj'; return `${days}d nazaj`; }
function daysSince(iso) { if(!iso) return null; return Math.floor((Date.now()-new Date(iso).getTime())/86400000); }
function toast(msg, type='ok') { const wrap=document.getElementById('toast-wrap'); const el=document.createElement('div'); el.className=`toast ${type==='err'?'err':type==='warn'?'warn':''}`; el.textContent=msg; wrap.appendChild(el); setTimeout(()=>el.remove(),2900); }
function copyToClipboard(text, label) { navigator.clipboard.writeText(text).then(()=>toast(`Kopirano: ${label}`,'ok')).catch(()=>toast('Kopiranje ni uspelo','err')); }
function escapeHtml(s) { if(s==null) return ''; return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s) { return escapeHtml(s); }

// ─── ORG / DOMAIN HELPERS ────────────────────────────────────────────────
function getUpnDomain(upn) {
  if (!upn) return null;
  const at = upn.lastIndexOf('@');
  if (at < 0) return null;
  return upn.slice(at + 1).toLowerCase();
}

function getDomainLabel(domain) {
  // Split domain into parts for visual display: e.g. "dem.si" → base "dem", tld ".si"
  const parts = domain.split('.');
  if (parts.length >= 2) {
    return { base: parts.slice(0, -1).join('.'), tld: '.' + parts[parts.length-1] };
  }
  return { base: domain, tld: '' };
}

// Generate a deterministic color for a domain string
function domainColor(domain) {
  const palette = ['#378ADD','#1D9E75','#7F77DD','#BA7517','#E24B4A','#5DCAA5','#639922','#9B59B6','#E67E22','#1ABC9C'];
  let hash = 0;
  for (let i=0; i<domain.length; i++) hash = (hash*31 + domain.charCodeAt(i)) >>> 0;
  return palette[hash % palette.length];
}

function computeOrgGroups() {
  const map = new Map(); // domain → { devices[], platforms:{}, compliance:{} }

  allDevices.forEach(d => {
    const domain = getUpnDomain(d.userPrincipalName) || '__shared__';
    if (!map.has(domain)) {
      map.set(domain, {
        domain,
        devices: [],
        platforms: { iOS:0, iPadOS:0, Android:0 },
        compliance: { compliant:0, noncompliant:0, inGracePeriod:0, unknown:0 }
      });
    }
    const g = map.get(domain);
    g.devices.push(d);
    if (d.operatingSystem && g.platforms[d.operatingSystem] !== undefined) g.platforms[d.operatingSystem]++;
    const cs = d.complianceState || 'unknown';
    if (g.compliance[cs] !== undefined) g.compliance[cs]++;
    else g.compliance.unknown++;
  });

  // Sort groups per current org sort
  let groups = [...map.values()];
  groups.sort((a, b) => {
    let av, bv;
    if (orgSortKey === 'total') { av = a.devices.length; bv = b.devices.length; }
    else if (orgSortKey === 'domain') { av = a.domain; bv = b.domain; }
    else if (orgSortKey === 'compliant') { av = a.devices.length ? a.compliance.compliant/a.devices.length : 0; bv = b.devices.length ? b.compliance.compliant/b.devices.length : 0; }
    else if (orgSortKey === 'noncompliant') { av = a.compliance.noncompliant; bv = b.compliance.noncompliant; }
    else { av = a.devices.length; bv = b.devices.length; }
    if (typeof av === 'string') { return orgSortDir==='asc' ? av.localeCompare(bv) : bv.localeCompare(av); }
    return orgSortDir==='asc' ? av-bv : bv-av;
  });

  // Filter by search
  if (orgSearch) {
    const q = orgSearch.toLowerCase();
    groups = groups.filter(g => g.domain.includes(q));
  }

  return groups;
}

// ─── TREND ───────────────────────────────────────────────────────────────
function getTrendDateRange() {
  const now = new Date(); now.setHours(23,59,59,999);
  let from, to = new Date(now), days = 30;
  if (trendRange==='custom' && trendCustom.from && trendCustom.to) {
    from = new Date(trendCustom.from); from.setHours(0,0,0,0);
    to = new Date(trendCustom.to); to.setHours(23,59,59,999);
    days = Math.max(1, Math.ceil((to-from)/86400000)+1);
  } else {
    const ranges={'7d':7,'30d':30,'90d':90,'6m':180,'1y':365};
    days = ranges[trendRange]||30;
    from = new Date(now); from.setDate(from.getDate()-days+1); from.setHours(0,0,0,0);
  }
  return { from, to, days };
}

function computeTrendData() {
  const { from, to, days } = getTrendDateRange();
  const filtered = allDevices.filter(d => {
    if (!d.enrolledDateTime) return false;
    if (trendPlatform!=='all' && d.operatingSystem!==trendPlatform) return false;
    return true;
  });
  const buckets = new Array(days).fill(0);
  const labels = [];
  for (let i=0; i<days; i++) { const d=new Date(from); d.setDate(from.getDate()+i); labels.push(d); }
  filtered.forEach(dev => {
    const en = new Date(dev.enrolledDateTime);
    if (en<from||en>to) return;
    const idx = Math.floor((en-from)/86400000);
    if (idx>=0&&idx<days) buckets[idx]++;
  });
  return { buckets, labels, from, to, days, total: buckets.reduce((a,b)=>a+b,0) };
}

  });

  filtered.sort((a,b)=>{
    let av=a[sortKey], bv=b[sortKey];

// ─── CHART ───────────────────────────────────────────────────────────────
function drawTrendChart() {
  const svg = document.getElementById('trend-svg');
  if (!svg) return;
  const data = computeTrendData();
  const { buckets, labels } = data;
  if (!buckets.length) return;
  const W=800,H=240,padL=38,padR=12,padT=14,padB=28;
  const chartW=W-padL-padR, chartH=H-padT-padB;
  const max=Math.max(...buckets,1);
  const yStep=max<=5?1:max<=10?2:max<=25?5:max<=50?10:max<=100?20:Math.ceil(max/5/10)*10;
  const yMax=Math.ceil(max/yStep)*yStep;
  const yTicks=[];
  for(let v=0;v<=yMax;v+=yStep) yTicks.push(v);
  const n=buckets.length;
  const xFor=i=>n===1?padL+chartW/2:padL+(i/(n-1))*chartW;
  const yFor=v=>padT+chartH-(v/yMax)*chartH;
  const accent=trendPlatform==='all'?'#378ADD':platformColor(trendPlatform);
  const linePath=buckets.map((v,i)=>`${i===0?'M':'L'}${xFor(i).toFixed(1)},${yFor(v).toFixed(1)}`).join(' ');
  const areaPath=linePath+` L${xFor(n-1).toFixed(1)},${yFor(0)} L${xFor(0).toFixed(1)},${yFor(0)} Z`;
  const xLabelCount=Math.min(8,n);
  const xLabelStep=Math.max(1,Math.floor((n-1)/(xLabelCount-1||1)));
  const xLabels=[];
  for(let i=0;i<n;i+=xLabelStep) xLabels.push(i);
  if(xLabels[xLabels.length-1]!==n-1) xLabels.push(n-1);
  let html=`<defs><linearGradient id="trend-grad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${accent}" stop-opacity="0.5"/><stop offset="100%" stop-color="${accent}" stop-opacity="0"/></linearGradient></defs>`;
  yTicks.forEach(v=>{
    const y=yFor(v);
    html+=`<line class="trend-grid-line" x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}"/>`;
    html+=`<text class="trend-axis-text" x="${padL-6}" y="${y+3}" text-anchor="end">${v}</text>`;
  });
  html+=`<path d="${areaPath}" fill="url(#trend-grad)" class="trend-area"/>`;
  html+=`<path d="${linePath}" class="trend-line" stroke="${accent}"/>`;
  xLabels.forEach(i=>{ html+=`<text class="trend-axis-text" x="${xFor(i)}" y="${H-10}" text-anchor="middle">${fmtDateShort(labels[i])}</text>`; });
  const showAllDots=n<=60;
  buckets.forEach((v,i)=>{
    if(!showAllDots&&v===0) return;
    const x=xFor(i),y=yFor(v),r=v>0?3:2;
    html+=`<circle class="trend-dot" cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${r}" fill="${v>0?accent:'var(--border3)'}" stroke="${v>0?'var(--surface)':'transparent'}" stroke-width="1.5" data-i="${i}"/>`;
  });
  svg.innerHTML=html;
  const tooltip=document.getElementById('trend-tooltip');
  svg.querySelectorAll('.trend-dot').forEach(dot=>{
    dot.addEventListener('mouseenter',e=>{
      const i=parseInt(e.target.dataset.i), v=buckets[i], d=labels[i];
      const dateStr=d.toLocaleDateString('sl-SI',{day:'numeric',month:'long',year:'numeric'});
      tooltip.innerHTML=`<div class="chart-tooltip-date">${dateStr}</div><div class="chart-tooltip-val"><span class="dot" style="background:${accent};"></span>${v} ${v===1?'naprava':v>=2&&v<=4?'naprave':'naprav'}</div>`;
      tooltip.style.opacity='1';
      const svgRect=svg.getBoundingClientRect(),wrapRect=svg.parentElement.getBoundingClientRect();
      const cx=parseFloat(e.target.getAttribute('cx')),cy=parseFloat(e.target.getAttribute('cy'));
      const realX=(cx/W)*svgRect.width, realY=(cy/H)*svgRect.height;
      const ttW=tooltip.offsetWidth,ttH=tooltip.offsetHeight;
      let left=realX-ttW/2, top=realY-ttH-12;
      if(left<0) left=4;
      if(left+ttW>wrapRect.width) left=wrapRect.width-ttW-4;
      if(top<0) top=realY+12;
      tooltip.style.left=left+'px'; tooltip.style.top=top+'px';
    });
    dot.addEventListener('mouseleave',()=>{ tooltip.style.opacity='0'; });
  });
}

// ─── CSV EXPORT ──────────────────────────────────────────────────────────
function exportCSV() {
  if(!allDevices.length){toast('Ni podatkov za izvoz','warn');return;}
  if(activeTab==='orgs') { exportOrgsCSV(); return; }
  const filtered=allDevices.filter(d=>{
    const mp=filterPlatform==='all'||d.operatingSystem===filterPlatform;
    const ms=filterStatus==='all'||d.complianceState===filterStatus;
    const q=searchQuery.toLowerCase();
    const matchQ=!q||(d.deviceName||'').toLowerCase().includes(q)||(d.userPrincipalName||'').toLowerCase().includes(q)||(d.model||'').toLowerCase().includes(q);
    return mp&&ms&&matchQ;
  });
  const cols=['deviceName','userPrincipalName','operatingSystem','osVersion','model','manufacturer','complianceState','managedDeviceOwnerType','lastSyncDateTime','enrolledDateTime','serialNumber','imei'];
  const headers=['Ime naprave','Uporabnik','OS','Verzija OS','Model','Proizvajalec','Skladnost','Lastništvo','Zadnja sync','Registrirana','Serijska št.','IMEI'];
  const esc=v=>{if(v==null)return '';const s=String(v).replace(/"/g,'""');return /[",\n]/.test(s)?`"${s}"`:s;};
  const rows=[headers.join(','),...filtered.map(d=>cols.map(c=>esc(d[c])).join(','))];
  downloadCSV('\uFEFF'+rows.join('\n'), `mdm-pulse-${fmtDateISO(new Date())}.csv`);
  toast(`Izvoženih ${filtered.length} naprav`,'ok');
}

function exportOrgsCSV() {
  const groups=computeOrgGroups();
  const headers=['Domena','Skupaj naprav','iOS','iPadOS','Android','Skladne','Neskladne','Grace','Neznano','% skladnosti'];
  const esc=v=>{if(v==null)return '';const s=String(v).replace(/"/g,'""');return /[",\n]/.test(s)?`"${s}"`:s;};
  const rows=[headers.join(','),...groups.map(g=>{
    const total=g.devices.length;
    const pct=total?Math.round(g.compliance.compliant/total*100):0;
    return [g.domain==='__shared__'?'Shared/brez UPN':g.domain,total,g.platforms.iOS,g.platforms.iPadOS,g.platforms.Android,g.compliance.compliant,g.compliance.noncompliant,g.compliance.inGracePeriod,g.compliance.unknown,pct+'%'].map(esc).join(',');
  })];
  downloadCSV('\uFEFF'+rows.join('\n'), `mdm-pulse-org-${fmtDateISO(new Date())}.csv`);
  toast(`Izvoženih ${groups.length} organizacij`,'ok');
}

function downloadCSV(content, filename) {
  const blob=new Blob([content],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=filename; a.click();
  URL.revokeObjectURL(url);
}

    if(redirectResp&&redirectResp.account){ account=redirectResp.account; msalInstance.setActiveAccount(account); afterLogin(); return; }
    const accounts=msalInstance.getAllAccounts();

})();

async function doServiceLogin() {
  const tenantId = document.getElementById('sa-tenant').value.trim();
  const clientId = document.getElementById('sa-client').value.trim();
  const clientSecret = document.getElementById('sa-secret').value.trim();
  const errEl = document.getElementById('login-error');

    errEl.textContent = 'Vnesi Tenant ID, Client ID in Client Secret.';
    errEl.style.display = 'block';
    return;
  }
  errEl.style.display = 'none';

  const btn = document.getElementById('btn-sa-login');
  btn.disabled = true;
  btn.textContent = 'Prijavljam…';

  try {
    const body = new URLSearchParams({
      grant_type: 'client_credentials',
      client_id: clientId,
      client_secret: clientSecret,
      scope: 'https://graph.microsoft.com/.default'
    });

    const res = await fetch(`https://login.microsoftonline.com/${tenantId}/oauth2/v2.0/token`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body
    });

    const data = await res.json();
    if (!res.ok || !data.access_token) {
      throw new Error(data.error_description || data.error || `Token napaka ${res.status}`);
    }

    // Store token and metadata
    localStorage.setItem('mdm_sa_tenant', tenantId);
    localStorage.setItem('mdm_sa_client', clientId);
    sessionStorage.setItem('mdm_sa_token', data.access_token);
    sessionStorage.setItem('mdm_sa_token_exp', String(Date.now() + (data.expires_in - 60) * 1000));

    // Set fake "account" for display
    account = { name: 'Service Account', username: clientId };
    
    // Show dashboard
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('topbar-right').innerHTML = `
      <div class="live-pill"><div class="live-dot"></div>Živi podatki</div>
      <div class="user-chip">
        <div class="user-avatar">SA</div>
        <span>Service Account</span>
      </div>
      <button class="btn btn-ghost" onclick="exportCSV()">⬇ CSV</button>
      <button class="btn btn-ghost" onclick="refreshData()">↻ Osveži</button>
      <button class="btn btn-danger" onclick="doLogout()">Odjava</button>
    `;
    loadDevices();

  } catch(e) {
    errEl.textContent = e.message || 'Prijava ni uspela.';
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Prijava s service računom';
  }
}  
</script>
</body>
</html>
